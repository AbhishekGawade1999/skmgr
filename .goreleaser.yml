version: 2
project_name: skmgr

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/AbhishekGawade1999/skmgr/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    # Use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: skmgr
    repository:
      owner: AbhishekGawade1999
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/AbhishekGawade1999/skmgr"
    description: "The framework-agnostic skill manager for AI agents"
    license: "Apache 2.0"
    test: |
      system "#{bin}/skmgr version"

extra_files:
  - glob: ./scripts/install.sh

nfpms:
  - id: skmgr
    package_name: skmgr
    homepage: "https://github.com/AbhishekGawade1999/skmgr"
    maintainer: "Abhishek Gawade <a.a.gawade1999@gmail.com>"
    description: "The framework-agnostic skill manager for AI agents"
    license: "Apache 2.0"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
